version: "3.9"

services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/travelagent
      REDIS_URL: redis://redis:6379
      QUEUE_URL: http://localstack:4566/000000000000/travel-agent
      STORAGE_BUCKET: travel-agent-local
      STORAGE_ENDPOINT_URL: http://localstack:4566
      AUTH_JWKS_URL: http://mock-auth:4000/.well-known/jwks.json
      AUTH_AUDIENCE: travel-agent-local
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AMADEUS_CLIENT_ID: ${AMADEUS_CLIENT_ID:-}
      AMADEUS_CLIENT_SECRET: ${AMADEUS_CLIENT_SECRET:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      TICKETMASTER_API_KEY: ${TICKETMASTER_API_KEY:-}
      TRIPDOTCOM_API_KEY: ${TRIPDOTCOM_API_KEY:-}
      CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - ./backend/app:/app/app  # Hot reload — mounts source
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      localstack:
        condition: service_healthy
      mock-auth:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_AUTH_MODE: mock
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  # ── Background workers ─────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/travelagent
      REDIS_URL: redis://redis:6379
      QUEUE_URL: http://localstack:4566/000000000000/travel-agent
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    command: python -m app.workers.scheduler

  # ── PostgreSQL (mirrors Aurora schema) ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: travelagent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

  # ── LocalStack (S3 + SQS emulation) ───────────────────────────────────────
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs,sns
      DEFAULT_REGION: us-east-1
      PERSISTENCE: 1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Mock Auth (Cognito JWT shape emulator) ─────────────────────────────────
  mock-auth:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    ports:
      - "4000:8080"
    environment:
      JSON_CONFIG: |
        {
          "interactiveLogin": true,
          "httpServer": "NettyWrapper",
          "tokenCallbacks": [
            {
              "issuerId": "travel-agent-local",
              "tokenExpiry": 3600,
              "requestMappings": [
                {
                  "requestParam": "scope",
                  "match": "openid",
                  "claims": {
                    "sub": "dev-user-123",
                    "email": "dev@localhost",
                    "name": "Dev User"
                  }
                }
              ]
            }
          ]
        }

volumes:
  postgres_data:
  redis_data:
  localstack_data:
